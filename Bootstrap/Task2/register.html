<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration - TechTrain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">TechTrain Academy</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#courseNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="courseNavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div id="successAlert" class="alert alert-success d-none mb-4 shadow-sm" role="alert">
                    <h4 class="alert-heading">🎉 Registration Submitted!</h4>
                    <p class="mb-0">Your course portal profile has been generated successfully. Our academic office will email confirmation steps shortly.</p>
                </div>

                <div class="card p-4 shadow-sm">
                    <h2 class="mb-4 text-center text-primary fw-bold">Online Application Form</h2>
                    
                    <form onsubmit="showRegistrationAlert(event)">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Student Full Name</label>
                                <input type="text" class="form-control" placeholder="Jane Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="jane@example.com" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" placeholder="10-digit phone number" minlength="10" maxlength="10" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Gender</label>
                                <select class="form-select" required>
                                    <option value="" disabled selected>Select option</option>
                                    <option>Female</option>
                                    <option>Male</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Select Course Program</label>
                                <select class="form-select" required>
                                    <option value="" disabled selected>Choose track...</option>
                                    <option>Web Development</option>
                                    <option>Python Programming</option>
                                    <option>Data Science</option>
                                    <option>AI & Machine Learning</option>
                                    <option>Java Programming</option>
                                    <option>Cloud Computing</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Highest Qualification</label>
                                <input type="text" class="form-control" placeholder="e.g., High School, Bachelor's Degree" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Upload Resume</label>
                                <input type="file" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Residential Address</label>
                                <textarea class="form-control" rows="2" placeholder="Street address, City, Postal Code" required></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label" for="terms">I verify that all entered application credentials are valid</label>
                                </div>
                            </div>
                            <div class="col-12 text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg px-5">Submit Registration Form</button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script>
        function showRegistrationAlert(event) {
            event.preventDefault(); // Stop standard blank refresh
            const targetAlert = document.getElementById('successAlert');
            targetAlert.classList.remove('d-none'); // Reveal the hidden Success Alert box
            window.scrollTo(0, 0); // Scroll nicely to view the alert
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
