<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - CampusFest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">✨ CampusFest</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#eventNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="eventNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Registration</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div id="submissionAlert" class="alert alert-success d-none shadow-sm" role="alert">
                    <h4 class="alert-heading">🎉 Registration Successful!</h4>
                    <p class="mb-0">Your seat has been reserved. A customized gate pass code has been generated and dispatched to your email address.</p>
                </div>

                <div class="card p-4 shadow-sm border-0">
                    <h2 class="text-center mb-4 fw-bold text-success">Pass Registration Form</h2>
                    <form onsubmit="handleFormSubmit(event)">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Student Full Name</label>
                                <input type="text" class="form-control" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Roll Number</label>
                                <input type="text" class="form-control" placeholder="e.g., 23CSE401" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Academic Branch</label>
                                <select class="form-select" required>
                                    <option value="" disabled selected>Choose branch...</option>
                                    <option>Computer Science (CSE)</option>
                                    <option>Electronics (ECE)</option>
                                    <option>Information Technology (IT)</option>
                                    <option>Mechanical Engineering</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@college.edu" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" placeholder="10-digit number" minlength="10" maxlength="10" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Target Event Selection</label>
                                <select class="form-select" required>
                                    <option value="" disabled selected>Choose event track...</option>
                                    <option>Technical Quiz</option>
                                    <option>24-Hour Hackathon</option>
                                    <option>Poster Presentation</option>
                                    <option>Coding Contest</option>
                                    <option>Project Expo</option>
                                    <option>Cultural Fest</option>
                                </select>
                            </div>
                            <div class="col-12 text-center mt-4">
                                <button type="submit" class="btn btn-success btn-lg px-5 fw-bold">Complete Registration</button>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault();
            document.getElementById('submissionAlert').classList.remove('d-none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
