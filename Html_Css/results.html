<!DOCTYPE html>
<html>
<head>
<title>Results</title>

<style>
.bar{
    width:300px;
    background:#ddd;
}

.progress{
    height:20px;
    background:green;
    color:white;
    text-align:center;
}
</style>

</head>
<body>

<h1>President Election Results</h1>

<table border="1">
<tr>
    <th>Candidate</th>
    <th>Votes</th>
    <th>Percentage</th>
</tr>

<tr>
    <td>Rahul Sharma</td>
    <td>150</td>
    <td>50%</td>
</tr>

<tr>
    <td>Priya Verma</td>
    <td>100</td>
    <td>33%</td>
</tr>

<tr>
    <td>Amit Kumar</td>
    <td>50</td>
    <td>17%</td>
</tr>

</table>

<h2>Winner: Rahul Sharma 🏆</h2>

<p>Rahul Sharma - 50%</p>
<div class="bar">
    <div class="progress" style="width:50%;">50%</div>
</div>

<p>Priya Verma - 33%</p>
<div class="bar">
    <div class="progress" style="width:33%;">33%</div>
</div>

<p>Amit Kumar - 17%</p>
<div class="bar">
    <div class="progress" style="width:17%;">17%</div>
</div>

</body>
</html>
